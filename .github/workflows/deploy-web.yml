name: Deploy web

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-web-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy raltic-web
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check required secrets
        env:
          HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          missing=0

          if [[ -z "${HEROUI_AUTH_TOKEN}" ]]; then
            echo "::error::Missing HEROUI_AUTH_TOKEN. Set a HeroUI Pro CI token in repository secrets before CI/deploy can install @heroui-pro/react."
            missing=1
          fi

          if [[ -z "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN. Set a Cloudflare API token with Workers deploy permissions before production deploy can run."
            missing=1
          fi

          exit "${missing}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}

      - name: Deploy web Worker
        working-directory: apps/web
        run: pnpm run deploy
        env:
          HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke production routes
        run: |
          check_200() {
            local url="$1"
            local label="$2"

            for attempt in 1 2 3 4 5; do
              code="$(curl -s -o /dev/null -w '%{http_code}' "${url}")"
              if [[ "${code}" == "200" ]]; then
                echo "${label} HTTP ${code}"
                return 0
              fi

              echo "${label} HTTP ${code} on attempt ${attempt}; retrying"
              sleep 5
            done

            echo "::error::${label} did not return HTTP 200"
            return 1
          }

          curl -fsS https://api.raltic.com/health >/tmp/raltic-api-health.json

          for path in / /runtimes /login /signup /privacy /terms /robots.txt /sitemap.xml; do
            check_200 "https://raltic.com${path}" "${path}"
          done

          redirect="$(curl -s -o /dev/null -w '%{http_code} %{redirect_url}' https://raltic.com/s/test)"
          if [[ "${redirect}" != "307 https://raltic.com/login" ]]; then
            echo "::error::Unexpected private route redirect: ${redirect}"
            exit 1
          fi

          echo "/s/test ${redirect}"
