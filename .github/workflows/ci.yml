name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Typecheck every workspace package via direct tsc, bypassing turbo
      # (turbo runs `lint` script per package, which is ESLint for web — its
      # advisory React Compiler warnings aren't gating bugs and have their
      # own dev-loop signal). Direct tsc gates every package's TypeScript
      # without ESLint noise, and auto-picks up new packages.
      - name: Typecheck all packages (direct tsc)
        run: pnpm --filter './packages/*' --filter './apps/*' --filter '!@raltic/web' exec tsc --noEmit
      - name: Typecheck web (separate — uses Next plugin)
        working-directory: apps/web
        run: npx tsc --noEmit

  build:
    name: Build (Next + Worker dry-run)
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Next.js (web)
        working-directory: apps/web
        run: npx next build
        env:
          NEXT_PUBLIC_RALTIC_API_URL: https://raltic-api.example.workers.dev
      - name: Build api Worker (dry run)
        working-directory: apps/api
        run: npx wrangler deploy --dry-run --outdir=dist
      - name: Build bridge bundle
        working-directory: apps/bridge
        run: pnpm run build

  unit-tests:
    name: Unit tests (auth-core + chat-room DO)
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run all package tests
        run: pnpm -r test --run

  e2e:
    name: E2E (Playwright vs staging)
    runs-on: ubuntu-latest
    needs: [unit-tests, build]
    # Run on push-to-main + same-repo PRs (not forks — staging access
    # tokens shouldn't leak to fork-author scripts).
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm e2e:install
      - name: Run E2E
        run: pnpm e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Single status check that aggregates all of the above. Configure this
  # as the only required check in branch-protection — adding/removing
  # individual jobs above won't break branch protection rules.
  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [typecheck, build, unit-tests]
    if: always()
    steps:
      - name: Require all upstream jobs to succeed
        run: |
          if [[ "${{ needs.typecheck.result }}" != "success" ]]; then echo "typecheck failed" && exit 1; fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then echo "build failed" && exit 1; fi
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then echo "unit-tests failed" && exit 1; fi
          echo "all gates passed"
